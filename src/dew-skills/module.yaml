code: dew
name: "Data Engineering Workflow"
description: "Evidence-driven data engineering workflow based on Fundamentals of Data Engineering and BMAD-style phased skills."
default_selected: true

# Variables from Core Config inserted:
## user_name
## project_name
## communication_language
## document_output_language
## output_folder

user_skill_level:
  prompt:
    - "What is your data engineering experience level?"
    - "This affects how agents explain concepts in chat."
  scope: user
  default: "intermediate"
  result: "{value}"
  single-select:
    - value: "beginner"
      label: "Beginner - Explain fundamentals carefully"
    - value: "intermediate"
      label: "Intermediate - Balance detail with speed"
    - value: "expert"
      label: "Expert - Be direct and technical"

learning_mode:
  prompt:
    - "Should DEW explain concepts and trade-offs at decision gates?"
  scope: user
  default: "true"
  result: "{value}"

planning_artifacts:
  prompt: "Where should planning artifacts be stored?"
  default: "{output_folder}/planning-artifacts"
  result: "{project-root}/{value}"

implementation_artifacts:
  prompt: "Where should implementation artifacts be stored?"
  default: "{output_folder}/implementation-artifacts"
  result: "{project-root}/{value}"

project_knowledge:
  prompt: "Where should long-term project knowledge be stored?"
  default: "docs"
  result: "{project-root}/{value}"

evidence_artifacts:
  prompt: "Where should validation evidence be stored?"
  default: "{output_folder}/evidence-artifacts"
  result: "{project-root}/{value}"

learning_artifacts:
  prompt: "Where should learning notes be stored?"
  default: "{output_folder}/learning-artifacts"
  result: "{project-root}/{value}"

directories:
  - "{planning_artifacts}"
  - "{implementation_artifacts}"
  - "{project_knowledge}"
  - "{evidence_artifacts}"
  - "{learning_artifacts}"

agents:
  - code: dew-agent-data-analyst
    name: Linh
    title: Data Analyst
    icon: "📊"
    team: data-engineering
    description: "Clarifies business questions, KPI definitions, data consumers, and decision context."

  - code: dew-agent-source-validator
    name: Quang
    title: Source Validation Engineer
    icon: "🔎"
    team: data-engineering
    description: "Validates source access, schema, samples, freshness, quality, and feasibility before architecture."

  - code: dew-agent-data-architect
    name: An
    title: Data Architect
    icon: "🏗️"
    team: data-engineering
    description: "Designs lifecycle architecture, storage, ingestion, transformation, serving, and trade-offs."

  - code: dew-agent-data-engineer
    name: Khoa
    title: Data Engineer
    icon: "💻"
    team: data-engineering
    description: "Implements ingestion, transformations, orchestration, tests, and pipeline logic."

  - code: dew-agent-data-quality-engineer
    name: Nhi
    title: Data Quality Engineer
    icon: "🧪"
    team: data-engineering
    description: "Defines and validates data quality rules, contract tests, profiling, and evidence."

  - code: dew-agent-governance-specialist
    name: Trang
    title: Data Governance Specialist
    icon: "🔐"
    team: data-engineering
    description: "Reviews privacy, access control, lineage, metadata, auditability, and compliance posture."

  - code: dew-agent-technical-writer
    name: Paige
    title: Technical Writer
    icon: "📚"
    team: data-engineering
    description: "Creates clear documentation, diagrams, learning notes, and reusable patterns."