# Workflow customization surface for dew-kpi-discovery.

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
  "file:{project-root}/**/business-discovery.md",
  "file:{project-root}/**/brief.md",
  "file:{project-root}/**/.decision-log.md",
  "file:{project-root}/**/.learning-log.md",
]

on_complete = ""

kpi_catalog_template = "assets/kpi-catalog-template.md"
kpi_definition_rubric = "assets/kpi-definition-rubric.md"
kpi_source_matrix_template = "assets/kpi-source-matrix-template.md"
checklist = "checklist.md"

kpi_output_path = "{planning_artifacts}/kpi-discovery"
run_folder_pattern = "kpi-discovery-{project_name}-{date}"

decision_log_path = "{planning_artifacts}/.decision-log.md"
learning_log_path = "{learning_artifacts}/.learning-log.md"