# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for dew-decision-gate.
#
# Override files:
#   {project-root}/_dew/custom/dew-decision-gate.toml
#   {project-root}/_dew/custom/dew-decision-gate.user.toml

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
  "file:{project-root}/**/.decision-log.md",
  "file:{project-root}/**/.learning-log.md",
]

on_complete = ""

global_rules = "assets/global-rules.md"
gate_template = "assets/decision-gate-template.md"
gate_catalog = "assets/gate-catalog.md"
frontmatter_schema = "assets/gate-frontmatter-schema.md"
checklist = "checklist.md"

decision_log_path = "{planning_artifacts}/.decision-log.md"
learning_log_path = "{learning_artifacts}/.learning-log.md"
evidence_index_path = "{evidence_artifacts}/validation-evidence-index.md"