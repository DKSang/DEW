# Workflow customization surface for dew-transformation-design.

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/data-architecture.md",
  "file:{project-root}/**/architecture-caveat-carryover.md",
  "file:{project-root}/**/storage-design.md",
  "file:{project-root}/**/source-to-storage-mapping.md",
  "file:{project-root}/**/ingestion-design.md",
  "file:{project-root}/**/ingestion-source-plan.md",
  "file:{project-root}/**/kpi-feasibility-report.md",
  "file:{project-root}/**/source-validation-report.md",
  "file:{project-root}/**/data-product-prd.md",
  "file:{project-root}/**/validation-evidence-index.md",
  "file:{project-root}/**/.decision-log.md",
  "file:{project-root}/**/.learning-log.md",
]

on_complete = ""

transformation_design_template = "assets/transformation-design-template.md"
business_rule_catalog_template = "assets/business-rule-catalog-template.md"
transformation_decision_record_template = "assets/transformation-decision-record-template.md"
grain_transformation_rubric = "assets/grain-transformation-rubric.md"
bronze_silver_gold_rule_guide = "assets/bronze-silver-gold-rule-guide.md"
checklist = "checklist.md"

transformation_output_path = "{planning_artifacts}/transformation-design"
run_folder_pattern = "transformation-design-{project_name}-{date}"

decision_log_path = "{planning_artifacts}/.decision-log.md"
learning_log_path = "{learning_artifacts}/.learning-log.md"
evidence_index_path = "{evidence_artifacts}/validation-evidence-index.md"
