# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for dew-ingestion-design.

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/data-architecture.md",
  "file:{project-root}/**/architecture-caveat-carryover.md",
  "file:{project-root}/**/storage-design.md",
  "file:{project-root}/**/source-to-storage-mapping.md",
  "file:{project-root}/**/source-validation-report.md",
  "file:{project-root}/**/source-contract-test*.md",
  "file:{project-root}/**/kpi-feasibility-report.md",
  "file:{project-root}/**/validation-evidence-index.md",
  "file:{project-root}/**/.decision-log.md",
  "file:{project-root}/**/.learning-log.md",
]

on_complete = ""

ingestion_design_template = "assets/ingestion-design-template.md"
ingestion_decision_record_template = "assets/ingestion-decision-record-template.md"
ingestion_source_plan_template = "assets/ingestion-source-plan-template.md"
ingestion_pattern_rubric = "assets/ingestion-pattern-rubric.md"
schema_evolution_rubric = "assets/schema-evolution-rubric.md"
failure_handling_rubric = "assets/failure-handling-rubric.md"
checklist = "checklist.md"

ingestion_output_path = "{planning_artifacts}/ingestion-design"
run_folder_pattern = "ingestion-design-{project_name}-{date}"

decision_log_path = "{planning_artifacts}/.decision-log.md"
learning_log_path = "{learning_artifacts}/.learning-log.md"
evidence_index_path = "{evidence_artifacts}/validation-evidence-index.md"