# Workflow customization surface for dew-implementation-readiness-review.

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/stories/**/*.md",
  "file:{project-root}/**/story-context/**/*.md",
  "file:{project-root}/**/sprint-status.yaml",
  "file:{project-root}/**/epics.md",
  "file:{project-root}/**/story-map.md",
  "file:{project-root}/**/.decision-log.md",
  "file:{project-root}/**/.learning-log.md",
]

on_complete = ""

readiness_report_template = "assets/implementation-readiness-report-template.md"
