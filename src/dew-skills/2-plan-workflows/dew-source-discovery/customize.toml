# Workflow customization surface for dew-source-discovery.

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/brief.md",
  "file:{project-root}/**/business-discovery.md",
  "file:{project-root}/**/kpi-catalog.md",
  "file:{project-root}/**/kpi-source-matrix.md",
  "file:{project-root}/**/data-product-prd.md",
  "file:{project-root}/**/.decision-log.md",
  "file:{project-root}/**/.learning-log.md",
]

on_complete = ""

source_inventory_template = "assets/source-inventory-template.md"
source_candidate_rubric = "assets/source-candidate-rubric.md"
source_type_guide = "assets/source-type-guide.md"
checklist = "checklist.md"

source_output_path = "{planning_artifacts}/source-discovery"
run_folder_pattern = "source-discovery-{project_name}-{date}"

decision_log_path = "{planning_artifacts}/.decision-log.md"
learning_log_path = "{learning_artifacts}/.learning-log.md"