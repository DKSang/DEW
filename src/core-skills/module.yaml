code: core
name: "DEW Core Module"
version: "0.1.0"
description: "Shared DEW utilities and configuration used across installed DEW modules."

header: "DEW Core Configuration"
subheader: "Configure shared settings for DEW skills, workflows, and agents."

user_name:
  prompt: "What should DEW agents call you?"
  scope: user
  default: "DEW User"
  result: "{value}"

project_name:
  prompt: "What is your data project called?"
  default: "{directory_name}"
  result: "{value}"

communication_language:
  prompt: "What language should DEW agents use when chatting with you?"
  scope: user
  default: "English"
  result: "{value}"

document_output_language:
  prompt: "Preferred document output language?"
  default: "English"
  result: "{value}"

output_folder:
  prompt: "Where should DEW output files be saved?"
  default: "_dew-output"
  result: "{project-root}/{value}"
